<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenShift Command Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e3a5f;--red:#e5484d;--cyan:#00c8ff;--gold:#f5a623;--green:#3ecf8e;--purple:#a78bfa;--text:#e2e8f0;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#0d1b2e 0%,#0a0e1a 60%);border-bottom:1px solid var(--border);padding:2rem 2rem 1.5rem;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.logo{background:var(--red);color:white;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.75rem;padding:.3rem .6rem;border-radius:4px;letter-spacing:1px}
h1{font-size:1.5rem;font-weight:800;color:white}
h1 span{color:var(--red)}
.subtitle{color:var(--muted);font-size:.85rem;margin-left:auto}
#search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.9rem;padding:.65rem 1rem;outline:none;transition:border-color .2s}
#search:focus{border-color:var(--cyan)}
#search::placeholder{color:var(--muted)}
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.filter-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);cursor:pointer;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;padding:.3rem .8rem;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--cyan);color:var(--cyan)}
main{padding:2rem;max-width:1400px;margin:0 auto}
.stats{display:flex;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.75rem}
.stat-num{font-size:1.5rem;font-weight:800}
.stat-label{font-size:.78rem;color:var(--muted)}
.section{margin-bottom:2.5rem}
.section-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.section-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.section-title{font-size:1rem;font-weight:700;color:white}
.section-count{background:var(--surface2);border-radius:20px;font-size:.72rem;color:var(--muted);padding:.15rem .6rem;margin-left:auto}
.commands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:.75rem}
.cmd-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;transition:all .2s}
.cmd-card:hover{border-color:var(--cyan);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,200,255,.08)}
.cmd-top{display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.5rem}
.cmd-code{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--cyan);background:rgba(0,200,255,.07);border:1px solid rgba(0,200,255,.15);border-radius:6px;padding:.3rem .6rem;flex:1;word-break:break-all;line-height:1.5}
.copy-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;font-size:.75rem;padding:.25rem .5rem;transition:all .15s;white-space:nowrap;font-family:'Syne',sans-serif}
.copy-btn:hover,.copy-btn.copied{border-color:var(--green);color:var(--green)}
.cmd-desc{font-size:.83rem;color:#94a3b8;line-height:1.55}
#no-results{text-align:center;padding:3rem;color:var(--muted);font-size:1rem;display:none}
.tip-bar{background:linear-gradient(90deg,rgba(0,200,255,.07),transparent);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;padding:.75rem 1rem;margin-bottom:2rem;font-size:.83rem;color:#94a3b8}
.tip-bar strong{color:var(--cyan)}
.tip-bar code{color:var(--cyan);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">OC CLI</div>
    <h1>OpenShift <span>Command</span> Reference</h1>
    <div class="subtitle">Complete Guide &middot; 200+ Commands</div>
  </div>
  <input type="text" id="search" placeholder="Search commands, descriptions..." oninput="filterCommands()">
  <div class="filters" id="filters"></div>
</header>
<main>
  <div class="tip-bar"><strong>Tip:</strong> All commands use the <code>oc</code> prefix. Most <code>kubectl</code> commands also work. Click <strong>Copy</strong> on any card.</div>
  <div class="stats" id="stats"></div>
  <div id="content"></div>
  <div id="no-results">No commands found. Try a different search term.</div>
</main>
<script>
var cats=[{name:"Login & Config",icon:"🔐",color:"#e5484d",tag:"auth",commands:[{cmd:"oc login https://api.cluster.example.com:6443",desc:"Log in to an OpenShift cluster using the API server URL. Prompts for username and password."},{cmd:"oc login -u admin -p password",desc:"Log in directly with username and password on the command line."},{cmd:"oc login --token=<token>",desc:"Authenticate with a bearer token — common for service accounts and CI pipelines."},{cmd:"oc logout",desc:"Log out and clear the current cluster session credentials."},{cmd:"oc whoami",desc:"Display the currently logged-in username."},{cmd:"oc whoami --show-server",desc:"Show the API server URL of the cluster you are connected to."},{cmd:"oc whoami --show-token",desc:"Print the current authentication token (treat as a password)."},{cmd:"oc config view",desc:"Display the full kubeconfig — clusters, users, and contexts."},{cmd:"oc config get-contexts",desc:"List all contexts defined in the kubeconfig file."},{cmd:"oc config use-context <name>",desc:"Switch to a different cluster or user context."},{cmd:"oc config current-context",desc:"Print the name of the currently active context."}]},{name:"Projects",icon:"📁",color:"#f5a623",tag:"projects",commands:[{cmd:"oc new-project <name>",desc:"Create a new project (OpenShift namespace) in the cluster."},{cmd:"oc new-project <name> --description='...' --display-name='...'",desc:"Create a project with a human-readable display name and description."},{cmd:"oc project <name>",desc:"Switch the active context to an existing project."},{cmd:"oc project",desc:"Show the name of the currently active project."},{cmd:"oc projects",desc:"List all projects you have access to."},{cmd:"oc get projects",desc:"List all projects in table format with their status."},{cmd:"oc delete project <name>",desc:"Permanently delete a project and everything inside it."},{cmd:"oc describe project <name>",desc:"Show project details including resource quotas and node selectors."}]},{name:"Apps & Deployments",icon:"🚀",color:"#3ecf8e",tag:"apps",commands:[{cmd:"oc new-app <image>",desc:"Create an application from a container image in a registry."},{cmd:"oc new-app <git-repo-url>",desc:"Build and deploy from a Git repo using Source-to-Image (S2I)."},{cmd:"oc new-app --template=<name>",desc:"Deploy an app using a predefined OpenShift template."},{cmd:"oc new-app -f <file.yaml>",desc:"Create an application from a local YAML or JSON definition file."},{cmd:"oc new-app --image-stream=<name>",desc:"Deploy from an existing ImageStream in the cluster."},{cmd:"oc get deployments",desc:"List all Kubernetes Deployment objects in the current project."},{cmd:"oc get deploymentconfigs",desc:"List all OpenShift DeploymentConfigs in the current project."},{cmd:"oc get dc",desc:"Shorthand alias for listing DeploymentConfigs."},{cmd:"oc describe dc <name>",desc:"Show full DeploymentConfig info: triggers, strategy, containers, and history."},{cmd:"oc rollout status dc/<name>",desc:"Watch and display the rollout progress of a DeploymentConfig."},{cmd:"oc rollout history dc/<name>",desc:"Show rollout revision history for a DeploymentConfig."},{cmd:"oc rollout undo dc/<name>",desc:"Roll back a DeploymentConfig to the previous revision."},{cmd:"oc rollout undo dc/<name> --to-revision=2",desc:"Roll back to a specific numbered revision."},{cmd:"oc rollout pause dc/<name>",desc:"Pause a rollout to safely batch multiple changes before redeploying."},{cmd:"oc rollout resume dc/<name>",desc:"Resume a previously paused rollout."},{cmd:"oc scale dc/<name> --replicas=3",desc:"Manually scale a DeploymentConfig to a specific replica count."},{cmd:"oc scale deployment/<name> --replicas=3",desc:"Scale a Kubernetes Deployment to the desired number of replicas."},{cmd:"oc autoscale dc/<name> --min=2 --max=5 --cpu-percent=70",desc:"Create a HorizontalPodAutoscaler to auto-scale based on CPU usage."},{cmd:"oc set image dc/<name> <container>=<new-image>",desc:"Update the container image used by a DeploymentConfig."},{cmd:"oc set env dc/<name> KEY=VALUE",desc:"Set or update an environment variable in a DeploymentConfig."},{cmd:"oc set env dc/<name> --list",desc:"List all environment variables set on a DeploymentConfig."},{cmd:"oc set resources dc/<name> --limits=cpu=200m,memory=256Mi",desc:"Set CPU and memory resource limits on DeploymentConfig containers."},{cmd:"oc set probe dc/<name> --liveness --get-url=http://:8080/health",desc:"Configure an HTTP liveness probe on a DeploymentConfig."}]},{name:"Pods",icon:"🫙",color:"#00c8ff",tag:"pods",commands:[{cmd:"oc get pods",desc:"List all pods in the current project."},{cmd:"oc get pods -o wide",desc:"List pods with extra detail: node name, IP, and nominated node."},{cmd:"oc get pods --all-namespaces",desc:"List pods across every project and namespace in the cluster."},{cmd:"oc get pods -w",desc:"Watch pod status in real-time as changes occur."},{cmd:"oc get pods -l app=<label>",desc:"Filter pods by a specific label selector."},{cmd:"oc describe pod <name>",desc:"Show detailed pod info: events, volumes, init containers, and conditions."},{cmd:"oc logs <pod>",desc:"Print logs from the main container of a running pod."},{cmd:"oc logs <pod> -c <container>",desc:"Print logs from a specific container in a multi-container pod."},{cmd:"oc logs <pod> -f",desc:"Stream pod logs in real-time as they are generated."},{cmd:"oc logs <pod> --previous",desc:"Show logs from the previous crashed container instance."},{cmd:"oc logs <pod> --tail=100",desc:"Show only the last N lines of pod logs."},{cmd:"oc exec <pod> -- <command>",desc:"Run a one-off command inside a running pod container."},{cmd:"oc exec -it <pod> -- /bin/bash",desc:"Open an interactive bash shell session inside a running pod."},{cmd:"oc exec -it <pod> -c <container> -- sh",desc:"Open an interactive shell in a specific container of a pod."},{cmd:"oc rsh <pod>",desc:"OpenShift shortcut to remote shell into a pod (auto-detects shell)."},{cmd:"oc delete pod <name>",desc:"Delete a pod — it restarts automatically if managed by a controller."},{cmd:"oc delete pod <name> --force --grace-period=0",desc:"Immediately force-delete a stuck or terminating pod."},{cmd:"oc cp <pod>:/path/file ./local",desc:"Copy a file from a pod to your local machine."},{cmd:"oc cp ./local-file <pod>:/remote/path",desc:"Copy a file from your local machine into a running pod."},{cmd:"oc top pods",desc:"Display real-time CPU and memory usage for all pods."},{cmd:"oc top pod <name>",desc:"Show resource consumption for a specific named pod."}]},{name:"Services & Networking",icon:"🌐",color:"#a78bfa",tag:"network",commands:[{cmd:"oc get services",desc:"List all Services in the current project."},{cmd:"oc get svc",desc:"Shorthand alias for listing Services."},{cmd:"oc describe svc <name>",desc:"Show service details: selector, ports, and backing endpoints."},{cmd:"oc expose svc/<name>",desc:"Create a Route to expose a Service externally via HTTP."},{cmd:"oc expose svc/<name> --hostname=app.example.com",desc:"Expose a service with a custom hostname in the Route."},{cmd:"oc expose svc/<name> --port=8080",desc:"Expose a service on a specific port via a Route."},{cmd:"oc get routes",desc:"List all Routes (external HTTP/HTTPS endpoints) in the project."},{cmd:"oc describe route <name>",desc:"Show route details: hostname, TLS config, and backend service."},{cmd:"oc delete route <name>",desc:"Remove an externally exposed Route from the project."},{cmd:"oc port-forward <pod> 8080:8080",desc:"Forward a local port to a pod port for local development and testing."},{cmd:"oc get endpoints",desc:"List Endpoint objects showing the pod IPs backing each service."},{cmd:"oc get networkpolicies",desc:"List NetworkPolicy objects controlling pod-to-pod traffic."},{cmd:"oc get ingress",desc:"List Kubernetes Ingress resources (used alongside Routes)."}]},{name:"Builds & Images",icon:"🏗️",color:"#f5a623",tag:"builds",commands:[{cmd:"oc get builds",desc:"List all build runs in the current project."},{cmd:"oc get buildconfigs",desc:"List all BuildConfig pipeline definitions."},{cmd:"oc get bc",desc:"Shorthand alias for listing BuildConfigs."},{cmd:"oc describe bc <name>",desc:"Show BuildConfig details: source, strategy, triggers, and output image."},{cmd:"oc start-build <bc>",desc:"Manually trigger a new build from a BuildConfig."},{cmd:"oc start-build <bc> --follow",desc:"Trigger a build and stream its output logs to the terminal."},{cmd:"oc start-build <bc> --from-file=<file>",desc:"Start a build using a local file as the source input."},{cmd:"oc start-build <bc> --from-dir=./src",desc:"Start a build using a local directory as the source."},{cmd:"oc cancel-build <build>",desc:"Cancel a build that is currently in progress."},{cmd:"oc logs build/<build>",desc:"View logs from a specific build run."},{cmd:"oc logs -f bc/<name>",desc:"Stream the latest build logs from a BuildConfig."},{cmd:"oc get imagestreams",desc:"List all ImageStream objects (managed image metadata)."},{cmd:"oc get is",desc:"Shorthand alias for listing ImageStreams."},{cmd:"oc describe is <name>",desc:"Show ImageStream details: tags, image references, and history."},{cmd:"oc get imagestreamtags",desc:"List all ImageStreamTag objects in the project."},{cmd:"oc import-image <name> --from=<registry/image> --confirm",desc:"Import an external image into an OpenShift ImageStream."},{cmd:"oc tag <src> <dest-stream>:<tag>",desc:"Tag an image from one location into an ImageStream."}]},{name:"ConfigMaps & Secrets",icon:"🔑",color:"#3ecf8e",tag:"config",commands:[{cmd:"oc get configmaps",desc:"List all ConfigMaps in the current project."},{cmd:"oc get cm",desc:"Shorthand alias for listing ConfigMaps."},{cmd:"oc describe cm <name>",desc:"Show ConfigMap contents and metadata."},{cmd:"oc create configmap <name> --from-literal=KEY=VALUE",desc:"Create a ConfigMap from one or more literal key-value pairs."},{cmd:"oc create configmap <name> --from-file=<file>",desc:"Create a ConfigMap from a file (filename becomes the key)."},{cmd:"oc create configmap <name> --from-env-file=.env",desc:"Create a ConfigMap from a .env file with KEY=VALUE entries."},{cmd:"oc get secrets",desc:"List all Secrets in the current project (values are masked)."},{cmd:"oc describe secret <name>",desc:"Show secret metadata and key names without revealing values."},{cmd:"oc create secret generic <name> --from-literal=KEY=VALUE",desc:"Create an opaque secret from literal key-value pairs."},{cmd:"oc create secret generic <name> --from-file=./creds.json",desc:"Create a secret from the contents of a file."},{cmd:"oc create secret docker-registry <name> --docker-server=... --docker-username=... --docker-password=...",desc:"Create a pull secret for a private container registry."},{cmd:"oc create secret tls <name> --cert=tls.crt --key=tls.key",desc:"Create a TLS secret from a certificate and private key file."},{cmd:"oc get secret <name> -o jsonpath='{.data.KEY}' | base64 -d",desc:"Decode and print a specific base64-encoded secret value."},{cmd:"oc set volume dc/<name> --add --name=cfg --configmap-name=<cm> --mount-path=/etc/config",desc:"Mount a ConfigMap as a volume at a path inside a pod."},{cmd:"oc set volume dc/<name> --add --name=sec --secret-name=<secret> --mount-path=/etc/secrets",desc:"Mount a Secret as a volume at a path inside a pod."}]},{name:"Storage & PVCs",icon:"💾",color:"#e5484d",tag:"storage",commands:[{cmd:"oc get pvc",desc:"List all PersistentVolumeClaims in the current project."},{cmd:"oc get pv",desc:"List all PersistentVolumes in the cluster (cluster-scoped resource)."},{cmd:"oc describe pvc <name>",desc:"Show PVC details: status, capacity, access modes, and bound PV."},{cmd:"oc create -f pvc.yaml",desc:"Create a PVC from a YAML definition file."},{cmd:"oc delete pvc <name>",desc:"Delete a PVC; PV behavior depends on the reclaim policy."},{cmd:"oc get storageclass",desc:"List StorageClasses available for dynamic volume provisioning."},{cmd:"oc describe storageclass <name>",desc:"Show StorageClass details: provisioner and configuration parameters."},{cmd:"oc set volume dc/<name> --add --name=data --type=pvc --claim-name=<pvc> --mount-path=/data",desc:"Attach an existing PVC to a DeploymentConfig as a mounted volume."}]},{name:"RBAC & Security",icon:"🛡️",color:"#a78bfa",tag:"rbac",commands:[{cmd:"oc get roles",desc:"List Roles scoped to the current project."},{cmd:"oc get clusterroles",desc:"List ClusterRoles available across the entire cluster."},{cmd:"oc get rolebindings",desc:"List RoleBindings in the current project."},{cmd:"oc get clusterrolebindings",desc:"List ClusterRoleBindings with cluster-wide permissions."},{cmd:"oc adm policy add-role-to-user <role> <user>",desc:"Grant a project-scoped Role to a specific user."},{cmd:"oc adm policy remove-role-from-user <role> <user>",desc:"Revoke a project-scoped Role from a specific user."},{cmd:"oc adm policy add-cluster-role-to-user <role> <user>",desc:"Grant a ClusterRole to a user across the entire cluster."},{cmd:"oc adm policy add-role-to-group <role> <group>",desc:"Grant a Role to a group of users in the current project."},{cmd:"oc adm policy add-scc-to-user <scc> -z <serviceaccount>",desc:"Assign a SecurityContextConstraints policy to a ServiceAccount."},{cmd:"oc adm policy add-scc-to-group anyuid system:authenticated",desc:"Grant anyuid SCC to all authenticated users — use with extreme caution."},{cmd:"oc get scc",desc:"List all SecurityContextConstraints in the cluster."},{cmd:"oc describe scc <name>",desc:"Show SCC details: capabilities, volume types, SELinux config."},{cmd:"oc get serviceaccounts",desc:"List all ServiceAccounts in the current project."},{cmd:"oc get sa",desc:"Shorthand alias for listing ServiceAccounts."},{cmd:"oc create serviceaccount <name>",desc:"Create a new ServiceAccount in the current project."},{cmd:"oc describe sa <name>",desc:"Show ServiceAccount details including its secrets and tokens."},{cmd:"oc auth can-i <verb> <resource>",desc:"Check whether the current user can perform a specific action on a resource."}]},{name:"Resource Management",icon:"📊",color:"#00c8ff",tag:"resources",commands:[{cmd:"oc get all",desc:"List all common resources (pods, services, routes, builds) in the project."},{cmd:"oc get all -l app=<name>",desc:"List all resources filtered by an app label."},{cmd:"oc get <resource> -o yaml",desc:"Output a resource definition in YAML format."},{cmd:"oc get <resource> -o json",desc:"Output a resource definition in JSON format."},{cmd:"oc get <resource> -o jsonpath='{.spec.replicas}'",desc:"Extract a specific field value using a JSONPath expression."},{cmd:"oc apply -f <file.yaml>",desc:"Create or update resources from a file (declarative, idempotent)."},{cmd:"oc create -f <file.yaml>",desc:"Create resources from a file; fails if the resource already exists."},{cmd:"oc replace -f <file.yaml>",desc:"Replace an existing resource entirely with the file contents."},{cmd:"oc delete -f <file.yaml>",desc:"Delete all resources defined in a YAML or JSON file."},{cmd:"oc delete <resource> <name>",desc:"Delete a specific named resource."},{cmd:"oc delete <resource> --all",desc:"Delete all resources of a given type in the current project."},{cmd:"oc edit <resource> <name>",desc:"Open a live resource in your editor to modify and save immediately."},{cmd:"oc patch <resource> <name> -p '{\"spec\":{\"replicas\":3}}'",desc:"Apply a JSON patch to update a specific resource field."},{cmd:"oc label <resource> <name> key=value",desc:"Add or update a label on a resource."},{cmd:"oc label <resource> <name> key-",desc:"Remove a label from a resource (note the trailing dash)."},{cmd:"oc annotate <resource> <name> key=value",desc:"Add or update an annotation on a resource."},{cmd:"oc get quota",desc:"List ResourceQuota objects enforcing limits in the project."},{cmd:"oc describe quota",desc:"Show current resource usage versus defined quota limits."},{cmd:"oc get limitrange",desc:"List LimitRange objects defining default and max resource limits per pod."},{cmd:"oc get events --sort-by='.lastTimestamp'",desc:"Show recent cluster events sorted by time — essential for debugging."}]},{name:"Templates & Operators",icon:"📦",color:"#f5a623",tag:"templates",commands:[{cmd:"oc get templates",desc:"List all Templates in the current project."},{cmd:"oc get templates -n openshift",desc:"List built-in templates from the shared openshift namespace."},{cmd:"oc describe template <name>",desc:"Show template parameters, defaults, and the objects it will create."},{cmd:"oc process <template> | oc apply -f -",desc:"Process a template with defaults and apply the output immediately."},{cmd:"oc process <template> -p PARAM=value | oc apply -f -",desc:"Process a template with overridden parameter values and apply it."},{cmd:"oc get csv",desc:"List ClusterServiceVersions (installed Operators and their versions)."},{cmd:"oc get subscriptions",desc:"List Operator subscriptions registered in OperatorHub."},{cmd:"oc get catalogsource",desc:"List Operator catalog sources providing available packages."},{cmd:"oc get installplan",desc:"List pending or approved Operator InstallPlans."},{cmd:"oc get operatorgroups",desc:"List OperatorGroups defining the namespace scope of Operators."}]},{name:"Nodes & Cluster Admin",icon:"⚙️",color:"#e5484d",tag:"admin",commands:[{cmd:"oc get nodes",desc:"List all nodes in the cluster with their Ready status."},{cmd:"oc get nodes -o wide",desc:"List nodes with extra detail: IPs, OS image, kernel, and runtime."},{cmd:"oc describe node <name>",desc:"Show full node info: capacity, resources, taints, and running pods."},{cmd:"oc top nodes",desc:"Display real-time CPU and memory usage for all nodes."},{cmd:"oc adm cordon <node>",desc:"Mark a node as unschedulable so no new pods are placed on it."},{cmd:"oc adm uncordon <node>",desc:"Re-enable scheduling on a previously cordoned node."},{cmd:"oc adm drain <node> --ignore-daemonsets --delete-local-data",desc:"Safely evict all pods from a node before maintenance."},{cmd:"oc adm taint nodes <node> key=value:NoSchedule",desc:"Add a taint to repel pods that lack a matching toleration."},{cmd:"oc adm manage-node <node> --list-pods",desc:"List all pods currently running on a specific node."},{cmd:"oc get clusterversion",desc:"Show the current OpenShift version and any ongoing update status."},{cmd:"oc adm upgrade",desc:"Check which cluster upgrades are available."},{cmd:"oc adm upgrade --to=<version>",desc:"Initiate a cluster upgrade to a specific target version."},{cmd:"oc get clusteroperators",desc:"List all cluster operators and their health — great for cluster checks."},{cmd:"oc get co",desc:"Shorthand alias for listing ClusterOperators."},{cmd:"oc describe co <name>",desc:"Show detailed conditions and messages for a ClusterOperator."},{cmd:"oc get machineconfigpools",desc:"List MachineConfigPools that group nodes sharing a configuration."},{cmd:"oc get machineconfigs",desc:"List all MachineConfig objects applied to cluster nodes."},{cmd:"oc get csr",desc:"List all Certificate Signing Requests in the cluster."},{cmd:"oc adm certificate approve <name>",desc:"Approve a pending CSR for a joining node or new user."}]},{name:"Debugging & Monitoring",icon:"🔍",color:"#3ecf8e",tag:"debug",commands:[{cmd:"oc debug pod/<name>",desc:"Launch a debug container from a pod's spec for interactive troubleshooting."},{cmd:"oc debug node/<node>",desc:"Open a privileged debug shell on a cluster node (requires cluster-admin)."},{cmd:"oc debug dc/<name>",desc:"Create a debug pod using a DeploymentConfig's container configuration."},{cmd:"oc get events",desc:"List all project events — warnings, scheduling changes, and errors."},{cmd:"oc get events --field-selector type=Warning",desc:"Filter events to show only Warning-type entries."},{cmd:"oc status",desc:"Show a high-level health overview of the current project and resources."},{cmd:"oc version",desc:"Show client, server, and Kubernetes version information."},{cmd:"oc api-resources",desc:"List all API resource types supported by the cluster."},{cmd:"oc api-versions",desc:"List all API group versions the cluster supports."},{cmd:"oc explain <resource>",desc:"Display API documentation for a resource type and its fields."},{cmd:"oc explain pod.spec.containers",desc:"Show documentation for a nested field path in a resource spec."},{cmd:"oc adm diagnostics",desc:"Run built-in diagnostic checks to surface common cluster issues."},{cmd:"oc adm must-gather",desc:"Collect cluster-wide diagnostic data (logs, configs) into a local directory."},{cmd:"oc adm must-gather --image=<custom-image>",desc:"Use a custom must-gather image for Operator-specific diagnostics."},{cmd:"oc adm inspect co/<name>",desc:"Collect detailed diagnostic data from a specific ClusterOperator."}]},{name:"Output & Formatting",icon:"📋",color:"#00c8ff",tag:"output",commands:[{cmd:"oc get pods -o yaml",desc:"Output complete pod definitions in YAML format."},{cmd:"oc get pods -o json",desc:"Output complete pod definitions in JSON format."},{cmd:"oc get pods -o name",desc:"Output only resource names — useful for scripting and piping."},{cmd:"oc get pods -o custom-columns=NAME:.metadata.name,STATUS:.status.phase",desc:"Show a custom table using JSONPath expressions as column values."},{cmd:"oc get pods --sort-by='.metadata.creationTimestamp'",desc:"Sort output by any field using dot-notation."},{cmd:"oc get pods -o jsonpath='{range .items[*]}{.metadata.name}{\"\\n\"}{end}'",desc:"Use a JSONPath template to extract and format fields from a list."},{cmd:"oc get pods --no-headers",desc:"Suppress the column header row from tabular output."},{cmd:"oc get pods -A",desc:"List pods in all namespaces (shorthand for --all-namespaces)."},{cmd:"oc get all --show-labels",desc:"Show all resources along with their label key-value pairs."}]}];

function escH(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function doCopy(btn,cmd){navigator.clipboard.writeText(cmd).then(function(){btn.textContent="Copied!";btn.classList.add("copied");setTimeout(function(){btn.textContent="Copy";btn.classList.remove("copied")},1500)})}
var activeTag="all";
function filterCommands(){renderAll(document.getElementById("search").value,activeTag)}
function setCategory(tag){activeTag=tag;document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active")});document.querySelector("[data-tag=\""+tag+"\"]").classList.add("active");filterCommands()}
function updateStats(cmds,cats){var total=cats.reduce?cats:0;var t=cats===0?0:cats;document.getElementById("stats").innerHTML='<div class="stat"><div class="stat-num" style="color:var(--cyan)">'+cmds+'</div><div class="stat-label">Commands Shown</div></div><div class="stat"><div class="stat-num" style="color:var(--green)">'+window._total+'</div><div class="stat-label">Total Commands</div></div><div class="stat"><div class="stat-num" style="color:var(--gold)">'+t+'</div><div class="stat-label">Categories</div></div>'}
function renderAll(filter,categoryTag){filter=(filter||"").toLowerCase();categoryTag=categoryTag||"all";var content=document.getElementById("content");content.innerHTML="";var totalShown=0,catShown=0;cats.forEach(function(cat){if(categoryTag!=="all"&&cat.tag!==categoryTag)return;var filtered=cat.commands.filter(function(c){return c.cmd.toLowerCase().includes(filter)||c.desc.toLowerCase().includes(filter)||cat.name.toLowerCase().includes(filter)});if(!filtered.length)return;catShown++;totalShown+=filtered.length;var sec=document.createElement("div");sec.className="section";sec.innerHTML='<div class="section-header"><div class="section-icon" style="background:'+cat.color+'22">'+cat.icon+'</div><div class="section-title">'+cat.name+'</div><div class="section-count">'+filtered.length+" commands</div></div>"+'<div class="commands-grid">'+filtered.map(function(c){return'<div class="cmd-card"><div class="cmd-top"><div class="cmd-code">'+escH(c.cmd)+'</div><button class="copy-btn" onclick="doCopy(this,\''+c.cmd.replace(/\\/g,"\\\\").replace(/'/g,"\\'")+'\')" >Copy</button></div><div class="cmd-desc">'+c.desc+"</div></div>"}).join("")+"</div>";content.appendChild(sec)});document.getElementById("no-results").style.display=totalShown===0?"block":"none";updateStats(totalShown,catShown)}
function buildFilters(){var f=document.getElementById("filters");f.innerHTML='<button class="filter-btn active" data-tag="all" onclick="setCategory(\'all\')">All</button>'+cats.map(function(c){return'<button class="filter-btn" data-tag="'+c.tag+'" onclick="setCategory(\''+c.tag+"\')\">" +c.icon+" "+c.name+"</button>"}).join("")}
window._total=cats.reduce(function(a,c){return a+c.commands.length},0);
buildFilters();renderAll();
</script>
</body>
</html>
